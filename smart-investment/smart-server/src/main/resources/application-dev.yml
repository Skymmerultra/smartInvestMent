# =============================================
# 智能投研系统 - 开发环境配置
# =============================================
spring:
  # DeepSeek AI 配置 (T-06)
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-6d6c019de98642f58fbab7c552b5cdd3}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 4096

  datasource:
    url: jdbc:mysql://192.168.56.102:3306/smart_investment?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: SmartInvest@2026
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis (T-07)
  data:
    redis:
      host: 192.168.56.102
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Elasticsearch (T-08)
  elasticsearch:
    uris: http://192.168.56.102:9200

  # RabbitMQ (T-09)
  rabbitmq:
    host: 192.168.56.102
    port: 5672
    username: guest
    password: guest
    # 生产者确认
    publisher-confirm-type: correlated
    publisher-returns: true
    # 消费者手动确认
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志
logging:
  level:
    com.smart.investment: debug
